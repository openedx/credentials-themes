[tox]
envlist = django{42,52}-test, lint
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    django42: django42
    django52: test
allowlist_externals =
    make
    npm
commands =
    npm install
    make build
    make test
    make validate_translations

[testenv:lint]
runner = uv-venv-lock-runner
dependency_groups = quality
commands =
    ruff check .
    ruff format --check .
